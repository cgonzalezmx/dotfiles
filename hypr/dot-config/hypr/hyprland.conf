################
### MONITORS ###
################

monitor=eDP-1,preferred,auto,1
monitor=HDMI-A-1,1920x1080@60,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = pcmanfm
#$menu = pkill -x wofi || wofi --show drun -i
$menu = pkill -x rofi || rofi -show drun
#$menu = pkill -x fuzzel || fuzzel
#$menu = pkill -x nwg-drawer || nwg-drawer
$browser = firefox

#################
### AUTOSTART ###
#################

exec-once = $terminal
exec-once = ~/.config/startup.apps


#############################
### ENVIRONMENT VARIABLES ###
#############################

$cursorTheme = Bibata-Modern-Ice
$cursorSize = 28

env = XCURSOR_THEME, $cursorTheme
env = XCURSOR_SIZE, $cursorSize
env = HYPRCURSOR_THEME, $cursorTheme
env = HYPRCURSOR_SIZE, $cursorSize

#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 8
    gaps_out = 12

    border_size = 3

    col.active_border = rgb(f5f5f5)
    col.inactive_border = rgba(696969aa)
    resize_on_border = false 
    allow_tearing = true
    layout = master
}

decoration {
    rounding = 13
    rounding_power = 4.0

    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = false

    blur {
        enabled = true
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = rgba(00000060)
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
}

misc { 
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
    accel_profile =
    sensitivity = -0.15

    touchpad {
        natural_scroll = true
        scroll_factor = 0.2
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
  force_zero_scaling = true
}

cursor {
    inactive_timeout = 30
}

source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/workspaces.conf
