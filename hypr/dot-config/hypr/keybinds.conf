$mod = SUPER

bind = $mod, RETURN, exec, $terminal
bind = $mod SHIFT, Q, killactive,
bind = SUPER_SHIFT, ESCAPE, exit,
bind = $mod, E, exec, $fileManager
bind = $mod, SPACE, togglefloating,
bindr = SUPER, SUPER_L, exec, $menu
bind = $mod, P, pseudo, # dwindle
bind = $mod, J, togglesplit, # dwindle
bind = $mod, B, exec, $browser
bind = SUPER_SHIFT, B, exec, firefox-developer-edition
bind = $mod, C, exec, code
bind = $mod, I, exec, inkscape
bind = $mod, U, exec, drivemenu mount
bind = $mod, F4, exec, kitty --class ncmpcpp sh -c ncmpcpp
bind = $mod, T, exec, ~/.config/hypr/scripts/telegram_control
bind = $mod, F, exec, flatpak run io.freetubeapp.FreeTube
bind = $mod, K, exec, flatpak run org.kde.krita
bind = $mod, S, exec, flatpak run com.valvesoftware.Steam

# Controles multimedia
bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = ,XF86AudioPlay, exec, mpc -q toggle

# Controles de brillo
# 311 = 1%
bind = ,XF86MonBrightnessUp, exec, brightnessctl --quiet set +3110
bind = ,XF86MonBrightnessDown, exec, brightnessctl --quiet set 3110-

# Move focus with mod + arrow keys
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, togglespecialworkspace, scratchpad
bind = ALT, 1, workspace, name:HDMI-1
bind = ALT, 2, workspace, name:HDMI-2
bind = ALT, 3, workspace, name:HDMI-3

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 1, movetoworkspace, name:HDMI-1
bind = ALT SHIFT, 2, movetoworkspace, name:HDMI-2
bind = ALT SHIFT, 3, movetoworkspace, name:HDMI-3

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
